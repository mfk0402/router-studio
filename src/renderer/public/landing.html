<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Router Studio</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        background: #0f1115;
        color: #e6e8ee;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
      p { max-width: 36rem; text-align: center; color: #9aa3b2; }
      a {
        margin-top: 1.5rem;
        color: #6cb6ff;
        text-decoration: none;
        border: 1px solid #3d4f66;
        padding: 0.5rem 1rem;
        border-radius: 6px;
      }
      a:hover { background: #1a212c; }
    </style>
  </head>
  <body>
    <h1>Router Studio</h1>
    <p>One workspace for models, tools, and agent tasks. Download the desktop app from GitHub releases.</p>
    <a href="https://github.com/mfk0402/router-studio">View on GitHub</a>
