<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' blob: data: https:; connect-src 'self' https: ws: wss: http://localhost:* http://127.0.0.1:*; worker-src 'self' blob:;"
    />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/splash-icon.png" />
    <title>Router Studio</title>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          Segoe UI,
          sans-serif;
        background:
          radial-gradient(ellipse 120% 80% at 50% -18%, rgb(99 102 255 / 0.25), transparent 52%),
          radial-gradient(ellipse 80% 50% at 100% 100%, rgb(34 211 238 / 0.06), transparent 45%),
          #0b1220;
        color: #e6e8eb;
        -webkit-font-smoothing: antialiased;
        transition:
          opacity 0.35s ease,
          visibility 0.35s ease;
      }
      #app-splash.app-splash--exiting {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .app-splash__logo {
        width: 80px;
        height: 80px;
        border-radius: 1.25rem;
        border: 1px solid rgb(255 255 255 / 0.12);
        box-shadow:
          0 1px 0 rgb(255 255 255 / 0.06) inset,
          0 16px 48px rgb(0 0 0 / 0.45);
        object-fit: contain;
        background: rgb(255 255 255 / 0.04);
      }
      .app-splash__title {
        margin: 0;
        font-size: 1.35rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        background: linear-gradient(108deg, #e0e7ff 0%, #a5b4fc 35%, #c4b5fd 65%, #fbcfe8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .app-splash__tagline {
        margin: 0;
        max-width: 18rem;
        text-align: center;
        font-size: 0.92rem;
        line-height: 1.45;
        color: rgb(163 172 191 / 0.95);
      }
      .app-splash__status {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgb(139 146 248 / 0.95);
      }
      .app-splash__dots {
        display: inline-flex;
        gap: 4px;
      }
      .app-splash__dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgb(139 146 248 / 0.85);
        animation: app-splash-bounce 1.1s ease-in-out infinite both;
      }
      .app-splash__dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .app-splash__dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes app-splash-bounce {
        0%,
        80%,
        100% {
          transform: scale(0.65);
          opacity: 0.45;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__dots span {
          animation: none;
          opacity: 0.85;
        }
        #app-splash.app-splash--exiting {
          transition: none;
        }
      }
    </style>
  </head>
  <body class="bg-bg text-fg font-sans antialiased">
    <div id="app-splash" role="status" aria-live="polite" aria-busy="true">
      <img class="app-splash__logo" src="/splash-icon.png" width="80" height="80" alt="" />
      <p class="app-splash__title">Router Studio</p>
      <p class="app-splash__tagline">One workspace for every AI model</p>
      <div class="app-splash__status">
        <span>Starting</span>
        <span class="app-splash__dots" aria-hidden="true"><span></span><span></span><span></span></span>
      </div>
    </div>
    <div id="root"></div>
    <!-- Fixed UI overlays (menubar menus, etc.): sibling of #root so not clipped by root overflow -->
    <div id="portal-root" aria-hidden="true"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
